api:
  openrouter_base_url: "https://openrouter.ai/api/v1"
  # openrouter_api_key is injected at runtime from ~/OPENROUTER_API_KEY.txt

models:
  script_writer: "anthropic/claude-sonnet-4-6"
  tts: "google/gemini-3.1-flash-tts-preview"
  video: "kling/kling-video-1.0-standard-text2video"
  whisper: "tiny"

voice:
  narrator_voice: "Charon"
  style_instructions: "Confident, direct, slightly dramatic. Clear diction. Fast pace."

ffmpeg:
  video_codec: "libx264"
  audio_codec: "aac"
  crf: 26
  fps: 24
  preset: "faster"
  threads: 8

video_gen:
  duration_fallback_seconds: 8
  motion_style: "slow cinematic camera movement, dramatic lighting, high detail"
  resolution: "1080x1920"

paths:
  db: "/mnt/storage/video-posts/data/blog_posts.db"
  db_karate: "/mnt/storage/video-posts/data/blog_posts.db"
  db_kombativ: "/mnt/storage/video-posts/data/blog_posts_kombativ.db"
  audio: "/mnt/storage/video-posts/audio"
  video_clips: "/mnt/storage/video-posts/video-clips"
  scripts: "/mnt/storage/video-posts/scripts"
  subtitles: "/mnt/storage/video-posts/subtitles"
  videos: "/mnt/storage/video-posts/videos"
  logs: "/mnt/storage/video-posts/logs"
  prompts: "/home/ian/video-posts/prompts"

pipeline:
  max_concurrent_requests: 3
  retry_attempts: 3
  retry_backoff_seconds: 5

script:
  target_clips_min: 2
  target_clips_max: 3

subtitles:
  font: "Arial"
  font_size: 88
  bold: true
  primary_color: "&H00FFFFFF"
  outline_color: "&H00000000"
  outline_width: 3
  vertical_position_percent: 75

rendering:
  mode: "remote"
  remote_host: "192.168.86.250"
  remote_port: 22022
  remote_user: "ian"
  remote_work_dir: "/tmp/video-posts-render"
